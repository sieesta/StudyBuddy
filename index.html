<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy Finder - Find Your Study Partner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-card">
            <div class="loader-orbit" aria-hidden="true"></div>
            <p class="loader-text">StudyBuddy Finder</p>
        </div>
    </div>

    <!-- Auth Container -->
    <div class="auth-container">
        <!-- Brand Section -->
        <div class="auth-brand">
            <div class="auth-brand-content">
                <h1>StudyBuddy Finder</h1>
                <p>Connect with students, ace your exams, and make learning social.</p>
                <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.9;">
                    📚 Join study groups • 🎯 Find perfect study partners • 🤖 Get AI help
                </p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="auth-form">
            <div class="auth-form-content">
                <!-- Login Form -->
                <form id="loginForm" class="is-hidden">
                    <h2>Welcome Back</h2>
                    
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-full" id="login-btn">Sign In</button>

                    <div class="auth-toggle">
                        Don't have an account? <a href="#" onclick="toggleForms(); return false;">Create one</a>
                    </div>
                </form>

                <!-- Signup Form -->
                <form id="signupForm" class="is-active">
                    <h2>Get Started</h2>
                    
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" placeholder="john_doe" required>
                    </div>

                    <button type="submit" class="btn btn-full" id="signup-btn">Create Account</button>

                    <div class="auth-toggle">
                        Already have an account? <a href="#" onclick="toggleForms(); return false;">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
